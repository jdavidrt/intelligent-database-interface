<svg xmlns="http://www.w3.org/2000/svg" width="920" height="905" viewBox="0 0 920 905" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="905" fill="#ffffff"/>
  <text x="460" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Enrutamiento de tres rutas — salvaguarda por lista de permitidos (allowlist)</text>
  <text x="460" y="50" text-anchor="middle" font-size="12" fill="#64748b">Ninguna pregunta genera SQL si no se reconoce como pertinente al dominio — el filtro falla de forma segura</text>

  <!-- Input -->
  <rect x="190" y="70" width="280" height="46" rx="9" fill="#eef2ff" stroke="#4338ca" stroke-width="1.5"/>
  <text x="330" y="98" text-anchor="middle" font-size="12.5" font-weight="700" fill="#312e81">Pregunta del usuario</text>

  <!-- D1: SQL data signal -->
  <polygon points="330,130 490,190 330,250 170,190" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="330" y="180" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">¿Señal explícita de</text>
  <text x="330" y="196" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">consulta de datos?</text>
  <text x="330" y="215" text-anchor="middle" font-size="9" fill="#92400e">count, top, average, list, highest, group by…</text>

  <!-- D2: about-the-DB / personal patterns -->
  <polygon points="330,280 490,340 330,400 170,340" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="330" y="328" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">¿Pregunta sobre la propia base,</text>
  <text x="330" y="344" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">o personal / fuera de tema?</text>
  <text x="330" y="364" text-anchor="middle" font-size="8.5" fill="#92400e">"what tables?", "which database?" / "how are you?"</text>

  <!-- D3: SQL knowledge -->
  <polygon points="330,430 490,490 330,550 170,490" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="330" y="486" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">¿Concepto general de SQL/BD?</text>
  <text x="330" y="506" text-anchor="middle" font-size="9" fill="#92400e">"what is a JOIN?", foreign key, index, normalización…</text>

  <!-- D4: allowlist -->
  <polygon points="330,580 505,640 330,700 155,640" fill="#f0fdf4" stroke="#059669" stroke-width="1.8"/>
  <text x="330" y="628" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">ALLOWLIST: ¿tokens de la pregunta ∩</text>
  <text x="330" y="644" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">vocabulario del dominio (DBProfile)?</text>
  <text x="330" y="664" text-anchor="middle" font-size="9" fill="#047857">tablas, columnas, glosario, valores codificados</text>

  <!-- D5: LLM fallback -->
  <polygon points="330,730 480,785 330,840 180,785" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="330" y="781" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Clasificador LLM de respaldo</text>
  <text x="330" y="801" text-anchor="middle" font-size="9" fill="#92400e">¿respuesta directa (YES) o datos (NO)? · T=0.0</text>

  <!-- ROUTE A -->
  <rect x="630" y="130" width="240" height="130" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8"/>
  <text x="750" y="155" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1d4ed8">RUTA A — Pipeline NL2SQL</text>
  <text x="750" y="175" text-anchor="middle" font-size="10" fill="#475569">Query Understanding → SQL</text>
  <text x="750" y="190" text-anchor="middle" font-size="10" fill="#475569">Generator → Verificación (3 capas)</text>
  <text x="750" y="205" text-anchor="middle" font-size="10" fill="#475569">→ Ejecución → respuesta didáctica</text>
  <text x="750" y="228" text-anchor="middle" font-size="9.5" fill="#2563eb" font-style="italic">única ruta que puede generar</text>
  <text x="750" y="242" text-anchor="middle" font-size="9.5" fill="#2563eb" font-style="italic">y ejecutar SQL</text>

  <!-- ROUTE B -->
  <rect x="630" y="300" width="240" height="150" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="1.8"/>
  <text x="750" y="325" text-anchor="middle" font-size="12.5" font-weight="700" fill="#065f46">RUTA B — Respuestas de la base</text>
  <text x="750" y="343" text-anchor="middle" font-size="12.5" font-weight="700" fill="#065f46">de datos seleccionada</text>
  <text x="750" y="363" text-anchor="middle" font-size="10" fill="#065f46">sobre la base: hechos actuales del DBProfile</text>
  <text x="750" y="378" text-anchor="middle" font-size="10" fill="#065f46">(nunca desde la memoria del modelo)</text>
  <text x="750" y="396" text-anchor="middle" font-size="10" fill="#065f46">concepto SQL: explicación ilustrada</text>
  <text x="750" y="411" text-anchor="middle" font-size="10" fill="#065f46">con tablas y columnas reales de la BD</text>
  <text x="750" y="434" text-anchor="middle" font-size="9.5" fill="#059669" font-style="italic">la respuesta también enseña (didáctica)</text>

  <!-- ROUTE C -->
  <rect x="630" y="520" width="240" height="130" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.8"/>
  <text x="750" y="545" text-anchor="middle" font-size="12.5" font-weight="700" fill="#991b1b">RUTA C — Respuestas fuera</text>
  <text x="750" y="561" text-anchor="middle" font-size="12.5" font-weight="700" fill="#991b1b">del propósito de IDI</text>
  <text x="750" y="579" text-anchor="middle" font-size="10" fill="#7f1d1d">preguntas personales o fuera de tema:</text>
  <text x="750" y="593" text-anchor="middle" font-size="10" fill="#7f1d1d">redirección cortés y breve que invita</text>
  <text x="750" y="607" text-anchor="middle" font-size="10" fill="#7f1d1d">a volver a la base de datos</text>
  <text x="750" y="627" text-anchor="middle" font-size="9.5" fill="#dc2626" font-style="italic">nunca inventa hechos del mundo real</text>
  <text x="750" y="641" text-anchor="middle" font-size="9.5" fill="#dc2626" font-style="italic">(clima, precios, noticias)</text>

  <!-- Vertical chain arrows -->
  <line x1="330" y1="116" x2="330" y2="130" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="330" y1="250" x2="330" y2="280" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="343" y="272" font-size="10" font-weight="600" fill="#64748b">no</text>
  <line x1="330" y1="400" x2="330" y2="430" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="343" y="422" font-size="10" font-weight="600" fill="#64748b">no</text>
  <line x1="330" y1="550" x2="330" y2="580" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="343" y="572" font-size="10" font-weight="600" fill="#64748b">no</text>
  <line x1="330" y1="700" x2="330" y2="730" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="343" y="722" font-size="10" font-weight="600" fill="#059669">sí (ambigua pero pertinente)</text>

  <!-- D1 yes -> A -->
  <line x1="490" y1="190" x2="630" y2="190" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrowBlue)"/>
  <text x="558" y="180" text-anchor="middle" font-size="10" font-weight="600" fill="#2563eb">sí</text>

  <!-- D2 -> B (about the DB) -->
  <line x1="490" y1="340" x2="630" y2="350" stroke="#059669" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="555" y="330" text-anchor="middle" font-size="9.5" font-weight="600" fill="#059669">sobre la base</text>

  <!-- D2 -> C (personal) -->
  <path d="M 415 372 C 550 440 580 500 655 520" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrowRed)"/>
  <text x="495" y="418" text-anchor="middle" font-size="9.5" font-weight="600" fill="#dc2626">personal</text>

  <!-- D3 yes -> B -->
  <line x1="490" y1="490" x2="630" y2="425" stroke="#059669" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="507" y="477" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">sí</text>

  <!-- D4 no -> C -->
  <line x1="505" y1="640" x2="630" y2="625" stroke="#dc2626" stroke-width="1.8" marker-end="url(#arrowRed)"/>
  <text x="565" y="655" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">no → fuera de propósito</text>

  <!-- D5 YES -> B (around route C, no crossings) -->
  <path d="M 480 785 C 730 800 900 700 900 545 C 900 470 890 442 874 430" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="685" y="772" text-anchor="middle" font-size="9.5" font-weight="600" fill="#059669">YES → respuesta fundamentada</text>

  <!-- D5 NO -> A (left return path) -->
  <path d="M 180 785 C 80 785 80 190 168 190" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="68" y="480" text-anchor="middle" font-size="9.5" font-weight="600" fill="#2563eb" transform="rotate(-90 68 480)">NO → pipeline NL2SQL (ruta A)</text>

  <text x="460" y="885" text-anchor="middle" font-size="10.5" fill="#94a3b8">Figura 2.4 — Decisión de tres rutas del MetaQuestionFilter. Fuente: backend/app/agents/clarification.py, commit 8cd337b (elaboración propia).</text>
</svg>
