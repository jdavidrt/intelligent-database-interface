<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1160" viewBox="0 0 720 1160" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="720" height="1160" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Pipeline agéntico de IDI — orquestación de una consulta (/query)</text>

  <!-- Orchestrator band -->
  <rect x="30" y="46" width="660" height="46" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="360" y="66" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">Multi-Agent Orchestrator</text>
  <text x="360" y="83" text-anchor="middle" font-size="9.5" fill="#475569">coordina el flujo, emite AgentEvents (started / progress / done / error) por WebSocket y persiste cada turno de la sesión</text>

  <!-- Adapter registry band -->
  <rect x="30" y="102" width="660" height="56" rx="10" fill="#fdf4ff" stroke="#a21caf" stroke-width="1.2"/>
  <text x="360" y="120" text-anchor="middle" font-size="11.5" font-weight="700" fill="#86198f">Registro de perfiles de instrucción (adapters/registry.json)</text>
  <text x="360" y="135" text-anchor="middle" font-size="10" fill="#701a75">activa el perfil especializado del agente inmediatamente antes de invocarlo —</text>
  <text x="360" y="149" text-anchor="middle" font-size="10" fill="#701a75">misma costura load_adapter() que luego cargará adaptadores LoRA (GGUF)</text>

  <!-- Column guides -->
  <text x="170" y="182" text-anchor="middle" font-size="10.5" font-weight="700" fill="#94a3b8">◀ respuestas sin generar SQL</text>
  <text x="545" y="182" text-anchor="middle" font-size="10.5" font-weight="700" fill="#94a3b8">el flujo correcto de la consulta desciende ▼</text>

  <!-- 1. Context Manager -->
  <rect x="420" y="196" width="250" height="84" rx="9" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
  <text x="545" y="216" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">1 · Context Manager</text>
  <text x="545" y="234" text-anchor="middle" font-size="10" fill="#475569">perfil de BD (DBProfile)</text>
  <text x="545" y="248" text-anchor="middle" font-size="10" fill="#475569">construido una sola vez en</text>
  <text x="545" y="262" text-anchor="middle" font-size="10" fill="#475569">POST /db/select y cacheado</text>

  <line x1="545" y1="280" x2="545" y2="300" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Route filter diamond -->
  <polygon points="545,300 670,355 545,410 420,355" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="545" y="340" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Filtro de rutas</text>
  <text x="545" y="356" text-anchor="middle" font-size="10" fill="#92400e">¿pregunta relevante</text>
  <text x="545" y="370" text-anchor="middle" font-size="10" fill="#92400e">para bases de datos?</text>

  <!-- Filter: no -> out of purpose -->
  <line x1="420" y1="355" x2="310" y2="355" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrowAmber)"/>
  <text x="365" y="345" text-anchor="middle" font-size="9.5" font-weight="600" fill="#b45309">no</text>

  <!-- Filter: about the DB itself / SQL concept -> direct answer -->
  <path d="M 470 377 C 400 420 300 435 225 468" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="322" y="448" text-anchor="middle" font-size="9.5" font-weight="600" fill="#047857">sí, sobre la propia base / concepto SQL</text>

  <!-- Filter: yes, data query -> continue -->
  <line x1="545" y1="410" x2="545" y2="440" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="558" y="430" font-size="9.5" font-weight="600" fill="#059669">sí → requiere consultar datos</text>

  <!-- Out-of-purpose box -->
  <rect x="30" y="310" width="280" height="90" rx="9" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="170" y="332" text-anchor="middle" font-size="11.5" font-weight="700" fill="#92400e">Respuestas fuera del propósito de IDI</text>
  <text x="170" y="352" text-anchor="middle" font-size="10" fill="#78350f">redirección cortés y breve, sin invocar</text>
  <text x="170" y="367" text-anchor="middle" font-size="10" fill="#78350f">el pipeline NL2SQL — nunca inventa</text>
  <text x="170" y="382" text-anchor="middle" font-size="10" fill="#78350f">hechos del mundo real (ruta C)</text>

  <!-- 2. Query Understanding -->
  <rect x="420" y="440" width="250" height="84" rx="9" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
  <text x="545" y="460" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">2 · Query Understanding</text>
  <text x="545" y="478" text-anchor="middle" font-size="10" fill="#475569">intención estructurada +</text>
  <text x="545" y="492" text-anchor="middle" font-size="10" fill="#475569">banderas de ambigüedad ·</text>
  <text x="545" y="506" text-anchor="middle" font-size="10" fill="#475569">historial (4 turnos) + ChromaDB</text>

  <line x1="545" y1="524" x2="545" y2="548" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Selected-database answers box -->
  <rect x="30" y="470" width="280" height="140" rx="9" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="170" y="492" text-anchor="middle" font-size="11.5" font-weight="700" fill="#065f46">Respuestas de la base</text>
  <text x="170" y="508" text-anchor="middle" font-size="11.5" font-weight="700" fill="#065f46">de datos seleccionada</text>
  <text x="170" y="530" text-anchor="middle" font-size="10" fill="#065f46">· clarificación al usuario: ¿está bien</text>
  <text x="170" y="545" text-anchor="middle" font-size="10" fill="#065f46">formulada la pregunta?</text>
  <text x="170" y="563" text-anchor="middle" font-size="10" fill="#065f46">· respuesta directa sobre el sistema o la</text>
  <text x="170" y="578" text-anchor="middle" font-size="10" fill="#065f46">base, anclada en el DBProfile (ruta B)</text>
  <text x="170" y="596" text-anchor="middle" font-size="10" fill="#065f46">· conceptos SQL con tablas reales</text>

  <!-- 3. Clarification diamond -->
  <polygon points="545,548 660,598 545,648 430,598" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="545" y="586" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">3 · Clarification</text>
  <text x="545" y="602" text-anchor="middle" font-size="10" fill="#92400e">¿banderas de</text>
  <text x="545" y="616" text-anchor="middle" font-size="10" fill="#92400e">ambigüedad?</text>

  <!-- Clarification: yes -> selected-database answers -->
  <line x1="430" y1="598" x2="310" y2="585" stroke="#059669" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="370" y="580" text-anchor="middle" font-size="9.5" font-weight="600" fill="#047857">sí → pide clarificación</text>

  <!-- Clarification: no -> continue -->
  <line x1="545" y1="648" x2="545" y2="672" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="558" y="666" font-size="9.5" font-weight="600" fill="#059669">no</text>

  <!-- 4. SQL Generator -->
  <rect x="420" y="672" width="250" height="84" rx="9" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
  <text x="545" y="692" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">4 · SQL Generator</text>
  <text x="545" y="710" text-anchor="middle" font-size="10" fill="#475569">NL→SQL con rationale,</text>
  <text x="545" y="724" text-anchor="middle" font-size="10" fill="#475569">anclado en DBProfile +</text>
  <text x="545" y="738" text-anchor="middle" font-size="10" fill="#475569">contexto ChromaDB · tokens/s</text>

  <line x1="545" y1="756" x2="545" y2="780" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 5. Verification -->
  <rect x="420" y="780" width="250" height="84" rx="9" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="545" y="800" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">5 · Verification</text>
  <text x="545" y="818" text-anchor="middle" font-size="10" fill="#7f1d1d">cadena de 3 capas:</text>
  <text x="545" y="832" text-anchor="middle" font-size="10" fill="#7f1d1d">sintaxis → semántica → sanidad</text>
  <text x="545" y="846" text-anchor="middle" font-size="10" fill="#7f1d1d">+ 1 intento de reparación</text>

  <!-- Verification cycle: fail -> back to SQL Generator for a new SqlCandidate -->
  <path d="M 420 822 C 350 822 350 714 420 714" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrowRed)"/>
  <text x="245" y="756" text-anchor="middle" font-size="9.5" font-weight="600" fill="#dc2626">ciclo de verificación: si falla,</text>
  <text x="245" y="770" text-anchor="middle" font-size="9.5" font-weight="600" fill="#dc2626">se genera un nuevo SqlCandidate</text>
  <text x="245" y="784" text-anchor="middle" font-size="9.5" font-weight="600" fill="#dc2626">(reparación silenciosa, 1 reintento)</text>

  <!-- Verification pass -> execution -->
  <line x1="545" y1="864" x2="545" y2="888" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="558" y="882" font-size="9.5" font-weight="600" fill="#059669">pasa</text>

  <!-- 6. Execution -->
  <rect x="420" y="888" width="250" height="84" rx="9" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="545" y="908" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">6 · Ejecución</text>
  <text x="545" y="926" text-anchor="middle" font-size="10" fill="#065f46">execute_read() — solo lectura,</text>
  <text x="545" y="940" text-anchor="middle" font-size="10" fill="#065f46">solo SQL que pasó las 3 capas</text>
  <text x="545" y="954" text-anchor="middle" font-size="10" fill="#065f46">FileConnector / MySQL local</text>

  <line x1="545" y1="972" x2="545" y2="996" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="558" y="990" font-size="9.5" fill="#64748b">filas</text>

  <!-- 7. Didactic answer -->
  <rect x="30" y="996" width="660" height="100" rx="9" fill="#eef2ff" stroke="#4338ca" stroke-width="1.5"/>
  <text x="360" y="1019" text-anchor="middle" font-size="12" font-weight="700" fill="#312e81">7 · Respuesta didáctica (4 paneles) + Visualization Engine + Session Manager</text>
  <text x="360" y="1039" text-anchor="middle" font-size="10.5" fill="#3730a3">Qué entendí · Por qué este SQL · Verificación · Resultado — gráfico automático (Recharts)</text>
  <text x="360" y="1056" text-anchor="middle" font-size="10.5" fill="#3730a3">El turno completo (pregunta, SQL, filas) se persiste en la sesión (SQLite)</text>
  <text x="360" y="1079" text-anchor="middle" font-size="10" fill="#6366f1">Obligación didáctica: el mismo formato sirve al ejecutivo (insight) y al aprendiz (el porqué)</text>

  <text x="360" y="1124" text-anchor="middle" font-size="10.5" fill="#94a3b8">Figura 2.2 — Pipeline agéntico: el flujo correcto de la consulta desciende por la derecha;</text>
  <text x="360" y="1140" text-anchor="middle" font-size="10.5" fill="#94a3b8">a la izquierda, las respuestas que no generan SQL. Fuente: backend/app/services/orchestrator.py (elaboración propia).</text>
</svg>
