<svg xmlns="http://www.w3.org/2000/svg" width="820" height="810" viewBox="0 0 820 810" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a21caf"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="820" height="810" fill="#ffffff"/>
  <text x="410" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Cadena de verificación tripartita + auto-corrección silenciosa</text>
  <text x="410" y="50" text-anchor="middle" font-size="12" fill="#64748b">Principio fail-safe: ningún SQL sin verificar llega a ejecutarse</text>

  <!-- Candidate -->
  <rect x="140" y="75" width="280" height="52" rx="9" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="280" y="97" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">SqlCandidate</text>
  <text x="280" y="114" text-anchor="middle" font-size="10.5" fill="#475569">SQL + rationale del SQL Generator</text>

  <!-- Layer 1 -->
  <rect x="120" y="160" width="320" height="78" rx="9" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
  <text x="280" y="182" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Capa 1 — Sintaxis</text>
  <text x="280" y="200" text-anchor="middle" font-size="10.5" fill="#475569">parseo con sqlglot +</text>
  <text x="280" y="215" text-anchor="middle" font-size="10.5" fill="#475569">EXPLAIN contra el motor real</text>
  <text x="280" y="230" text-anchor="middle" font-size="9.5" fill="#94a3b8">si falla: capas 2 y 3 se omiten (bloqueo inmediato)</text>

  <!-- Layer 2 -->
  <rect x="120" y="270" width="320" height="78" rx="9" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
  <text x="280" y="292" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Capa 2 — Semántica</text>
  <text x="280" y="310" text-anchor="middle" font-size="10.5" fill="#475569">toda tabla y columna referenciada</text>
  <text x="280" y="325" text-anchor="middle" font-size="10.5" fill="#475569">debe existir en el DBProfile</text>
  <text x="280" y="340" text-anchor="middle" font-size="9.5" fill="#94a3b8">ataca la causa dominante de error: schema linking</text>

  <!-- Layer 3 -->
  <rect x="120" y="380" width="320" height="78" rx="9" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
  <text x="280" y="402" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Capa 3 — Sanidad</text>
  <text x="280" y="420" text-anchor="middle" font-size="10.5" fill="#475569">solo lectura (SELECT), sin DDL/DML,</text>
  <text x="280" y="435" text-anchor="middle" font-size="10.5" fill="#475569">chequeos de plausibilidad del resultado</text>
  <text x="280" y="450" text-anchor="middle" font-size="9.5" fill="#94a3b8">DROP/DELETE/UPDATE jamás alcanzan la ejecución</text>

  <!-- Decision -->
  <polygon points="280,495 400,545 280,595 160,545" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="280" y="538" text-anchor="middle" font-size="11.5" font-weight="700" fill="#92400e">¿Pasan las</text>
  <text x="280" y="555" text-anchor="middle" font-size="11.5" font-weight="700" fill="#92400e">tres capas?</text>

  <!-- Execute -->
  <rect x="120" y="650" width="320" height="70" rx="9" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="280" y="675" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">Ejecutar (execute_read)</text>
  <text x="280" y="693" text-anchor="middle" font-size="10.5" fill="#065f46">resultado + resumen didáctico de 4 paneles</text>
  <text x="280" y="708" text-anchor="middle" font-size="10" fill="#059669">el usuario nunca vio el error reparado (UC-06)</text>

  <!-- Repair box — aligned with the decision diamond -->
  <rect x="520" y="495" width="260" height="120" rx="9" fill="#fdf4ff" stroke="#a21caf" stroke-width="1.5"/>
  <text x="650" y="518" text-anchor="middle" font-size="12" font-weight="700" fill="#86198f">Reparación automática</text>
  <text x="650" y="537" text-anchor="middle" font-size="10.5" fill="#701a75">un (1) solo intento: el agente propone</text>
  <text x="650" y="552" text-anchor="middle" font-size="10.5" fill="#701a75">repaired_sql a partir del diagnóstico</text>
  <text x="650" y="567" text-anchor="middle" font-size="10.5" fill="#701a75">de las capas semántica y de sanidad</text>
  <text x="650" y="587" text-anchor="middle" font-size="10" fill="#a21caf" font-style="italic">política silenciosa: el reintento es</text>
  <text x="650" y="602" text-anchor="middle" font-size="10" fill="#a21caf" font-style="italic">contexto interno, no se muestra en la UI</text>

  <!-- Block -->
  <rect x="520" y="650" width="260" height="100" rx="9" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="650" y="675" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">Bloqueo — no se ejecuta</text>
  <text x="650" y="694" text-anchor="middle" font-size="10.5" fill="#7f1d1d">el fallo se comunica como explicación</text>
  <text x="650" y="709" text-anchor="middle" font-size="10.5" fill="#7f1d1d">conceptual, no como error técnico</text>
  <text x="650" y="728" text-anchor="middle" font-size="10" fill="#b91c1c">(requerimiento didáctico del Verification Agent)</text>

  <!-- Chain arrows -->
  <line x1="280" y1="127" x2="280" y2="160" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="280" y1="238" x2="280" y2="270" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="280" y1="348" x2="280" y2="380" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="280" y1="458" x2="280" y2="495" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- yes -> execute -->
  <line x1="280" y1="595" x2="280" y2="650" stroke="#059669" stroke-width="1.8" marker-end="url(#arrowGreen)"/>
  <text x="295" y="628" font-size="10.5" font-weight="600" fill="#059669">sí</text>

  <!-- fail with repair -> repair box (straight, no crossing) -->
  <line x1="400" y1="545" x2="520" y2="545" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="460" y="535" text-anchor="middle" font-size="10.5" font-weight="600" fill="#dc2626">no, con reparación</text>

  <!-- repair loop: back to the start as a new SqlCandidate -->
  <path d="M 650 495 L 650 101 L 420 101" stroke="#a21caf" stroke-width="1.5" fill="none" marker-end="url(#arrowPurple)"/>
  <text x="545" y="92" text-anchor="middle" font-size="10" font-weight="600" fill="#a21caf">nuevo SqlCandidate — repite las 3 capas</text>
  <text x="663" y="300" font-size="10" font-weight="600" fill="#a21caf" transform="rotate(90 663 300)">ciclo de verificación</text>

  <!-- fail without repair -> block -->
  <path d="M 352 575 C 430 615 470 655 520 675" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrowRed)"/>
  <text x="415" y="632" font-size="10.5" font-weight="600" fill="#dc2626">no, sin reparación posible</text>

  <text x="410" y="790" text-anchor="middle" font-size="10.5" fill="#94a3b8">Figura 2.3 — Cadena de verificación y política de auto-corrección silenciosa. Fuente: backend/app/agents/verification.py y orchestrator.py (elaboración propia).</text>
</svg>
