[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
python_files = ["test_*.py"]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py313"
exclude = ["frontend", "legacydocs", ".venv"]

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.ruff.lint.per-file-ignores]
# Colab notebooks: cell-by-cell flow legitimately interleaves shell magics,
# sys.path setup and imports; module-level lint rules don't apply.
"*.ipynb" = ["E401", "E402", "E501", "E741", "I001"]

[tool.black]
line-length = 100
target-version = ["py313"]
extend-exclude = "frontend|legacydocs|\\.venv"
