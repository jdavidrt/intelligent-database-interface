<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>
  <text x="480" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">IDI — Vista general de la solución (local-first)</text>
  <text x="480" y="50" text-anchor="middle" font-size="12" fill="#64748b">Todos los componentes corren en la máquina del usuario · presupuesto &lt; 3.5 GB VRAM</text>

  <!-- ===== Usuario ===== -->
  <rect x="25" y="255" width="110" height="70" rx="10" fill="#eef2ff" stroke="#4338ca" stroke-width="1.5"/>
  <text x="80" y="285" text-anchor="middle" font-size="13" font-weight="700" fill="#312e81">Usuario</text>
  <text x="80" y="303" text-anchor="middle" font-size="10.5" fill="#4338ca">aprendiz / ejecutivo</text>

  <!-- ===== Frontend ===== -->
  <rect x="170" y="90" width="220" height="420" rx="12" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
  <text x="280" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Frontend — React + TS</text>
  <text x="280" y="132" text-anchor="middle" font-size="10.5" fill="#64748b">Vite · Zustand · CSS Modules</text>

  <rect x="185" y="145" width="190" height="52" rx="7" fill="#ffffff" stroke="#94a3b8"/>
  <text x="280" y="166" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1e293b">DatabaseSelector</text>
  <text x="280" y="182" text-anchor="middle" font-size="10" fill="#64748b">pantalla de selección de BD</text>

  <rect x="185" y="205" width="190" height="52" rx="7" fill="#ffffff" stroke="#94a3b8"/>
  <text x="280" y="226" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1e293b">Chat didáctico</text>
  <text x="280" y="242" text-anchor="middle" font-size="10" fill="#64748b">respuesta de 4 paneles</text>

  <rect x="185" y="265" width="190" height="52" rx="7" fill="#ffffff" stroke="#94a3b8"/>
  <text x="280" y="286" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1e293b">DB Info (drawer)</text>
  <text x="280" y="302" text-anchor="middle" font-size="10" fill="#64748b">esquema y contexto explorables</text>

  <rect x="185" y="325" width="190" height="52" rx="7" fill="#ffffff" stroke="#94a3b8"/>
  <text x="280" y="346" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1e293b">Progreso + etiquetas de perfil</text>
  <text x="280" y="362" text-anchor="middle" font-size="10" fill="#64748b">perfil activo por agente (WS)</text>

  <rect x="185" y="385" width="190" height="52" rx="7" fill="#ffffff" stroke="#94a3b8"/>
  <text x="280" y="406" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1e293b">Visualización</text>
  <text x="280" y="422" text-anchor="middle" font-size="10" fill="#64748b">auto-gráfico con Recharts</text>

  <rect x="185" y="445" width="190" height="52" rx="7" fill="#ffffff" stroke="#94a3b8"/>
  <text x="280" y="466" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1e293b">Biblioteca de sesiones</text>
  <text x="280" y="482" text-anchor="middle" font-size="10" fill="#64748b">guardar / retomar investigaciones</text>

  <!-- ===== Backend ===== -->
  <rect x="440" y="90" width="240" height="420" rx="12" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
  <text x="560" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Backend — FastAPI</text>
  <text x="560" y="132" text-anchor="middle" font-size="10.5" fill="#64748b">REST + WebSocket (NDJSON streaming)</text>

  <rect x="455" y="145" width="210" height="88" rx="7" fill="#ffffff" stroke="#94a3b8"/>
  <text x="560" y="164" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1e293b">API</text>
  <text x="560" y="181" text-anchor="middle" font-size="10" fill="#475569">POST /query · POST /db/select</text>
  <text x="560" y="196" text-anchor="middle" font-size="10" fill="#475569">GET /db/list · /db/profile · /db/last-used</text>
  <text x="560" y="211" text-anchor="middle" font-size="10" fill="#475569">GET·POST /session · GET /health · WS /ws</text>

  <rect x="455" y="243" width="210" height="200" rx="7" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="560" y="263" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1d4ed8">Orquestador multi-agente</text>
  <text x="560" y="281" text-anchor="middle" font-size="10" fill="#475569">Context Manager · Query Understanding</text>
  <text x="560" y="296" text-anchor="middle" font-size="10" fill="#475569">Clarification + filtro de 3 rutas</text>
  <text x="560" y="311" text-anchor="middle" font-size="10" fill="#475569">SQL Generator · Verification (3 capas)</text>
  <text x="560" y="326" text-anchor="middle" font-size="10" fill="#475569">Visualization · Session Manager</text>
  <line x1="470" y1="338" x2="650" y2="338" stroke="#93c5fd"/>
  <text x="560" y="356" text-anchor="middle" font-size="10" fill="#475569">registro de perfiles de instrucción</text>
  <text x="560" y="371" text-anchor="middle" font-size="10" fill="#475569">adapters/registry.json — hot-swap</text>
  <text x="560" y="386" text-anchor="middle" font-size="10" fill="#475569">activación antes de cada agente</text>
  <line x1="470" y1="398" x2="650" y2="398" stroke="#93c5fd"/>
  <text x="560" y="416" text-anchor="middle" font-size="10" fill="#475569">AgentEvents en tiempo real</text>
  <text x="560" y="431" text-anchor="middle" font-size="10" fill="#475569">con etiqueta del perfil activo</text>

  <rect x="455" y="455" width="210" height="42" rx="7" fill="#ffffff" stroke="#94a3b8"/>
  <text x="560" y="473" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Descubrimiento de BDs</text>
  <text x="560" y="488" text-anchor="middle" font-size="10" fill="#64748b">services/db/discovery.py</text>

  <!-- ===== Servicios locales ===== -->
  <rect x="730" y="90" width="210" height="420" rx="12" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
  <text x="835" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Servicios locales</text>

  <rect x="745" y="130" width="180" height="80" rx="7" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="835" y="150" text-anchor="middle" font-size="11.5" font-weight="700" fill="#713f12">llama.cpp (llama-server)</text>
  <text x="835" y="167" text-anchor="middle" font-size="10" fill="#713f12">Qwen2.5-Coder-3B-Instruct</text>
  <text x="835" y="182" text-anchor="middle" font-size="10" fill="#713f12">GGUF Q4_K_M · ~2 GB VRAM</text>
  <text x="835" y="197" text-anchor="middle" font-size="10" fill="#713f12">puerto 7860</text>

  <rect x="745" y="222" width="180" height="64" rx="7" fill="#ecfdf5" stroke="#059669"/>
  <text x="835" y="242" text-anchor="middle" font-size="11.5" font-weight="700" fill="#065f46">ChromaDB</text>
  <text x="835" y="258" text-anchor="middle" font-size="10" fill="#065f46">embeddings de esquema y contexto</text>
  <text x="835" y="273" text-anchor="middle" font-size="10" fill="#065f46">data/chromadb/</text>

  <rect x="745" y="298" width="180" height="64" rx="7" fill="#ecfdf5" stroke="#059669"/>
  <text x="835" y="318" text-anchor="middle" font-size="11.5" font-weight="700" fill="#065f46">SQLite (sesiones)</text>
  <text x="835" y="334" text-anchor="middle" font-size="10" fill="#065f46">turnos, SQL y resultados</text>
  <text x="835" y="349" text-anchor="middle" font-size="10" fill="#065f46">data/sessions.db</text>

  <rect x="745" y="374" width="180" height="122" rx="7" fill="#f1f5f9" stroke="#64748b"/>
  <text x="835" y="394" text-anchor="middle" font-size="11.5" font-weight="700" fill="#334155">databases/&lt;nombre&gt;/</text>
  <text x="835" y="411" text-anchor="middle" font-size="10" fill="#475569">01 schema.sql · 02 data.sql</text>
  <text x="835" y="426" text-anchor="middle" font-size="10" fill="#475569">02 context.md · 03 edge_cases.md</text>
  <text x="835" y="441" text-anchor="middle" font-size="10" fill="#475569">04 survey.json (glosario)</text>
  <line x1="760" y1="452" x2="910" y2="452" stroke="#cbd5e1"/>
  <text x="835" y="469" text-anchor="middle" font-size="10" fill="#475569">FileConnector → SQLite en memoria</text>
  <text x="835" y="484" text-anchor="middle" font-size="10" fill="#475569">(en curso: conector MySQL real)</text>

  <!-- ===== Flechas ===== -->
  <line x1="135" y1="290" x2="170" y2="290" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="390" y1="200" x2="440" y2="200" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="415" y="190" text-anchor="middle" font-size="9.5" fill="#64748b">REST</text>

  <line x1="440" y1="370" x2="390" y2="370" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="415" y="360" text-anchor="middle" font-size="9.5" fill="#64748b">eventos WS</text>

  <line x1="680" y1="170" x2="745" y2="170" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="712" y="160" text-anchor="middle" font-size="9.5" fill="#64748b">inferencia</text>

  <line x1="680" y1="254" x2="745" y2="254" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="712" y="244" text-anchor="middle" font-size="9.5" fill="#64748b">contexto</text>

  <line x1="680" y1="330" x2="745" y2="330" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="712" y="320" text-anchor="middle" font-size="9.5" fill="#64748b">sesiones</text>

  <line x1="680" y1="435" x2="745" y2="435" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="712" y="425" text-anchor="middle" font-size="9.5" fill="#64748b">datos</text>

  <text x="480" y="560" text-anchor="middle" font-size="10.5" fill="#94a3b8">Figura 2.1 — Arquitectura general de la solución IDI. Fuente: elaboración propia a partir del repositorio (backend/app, frontend/, databases/).</text>
</svg>
